  <!-- Modal for large image (optional enhancement) -->
  <div class="modal-overlay" id="modal" aria-hidden="true">
    <div class="modal-content">
      <button class="modal-close" id="modalClose" aria-label="关闭">×</button>
      <img id="modalImage" src="" alt="大图">
    </div>
  </div>

  <script>
    // Optional: open large image in modal instead of new tab
    (function () {
      var galleryLinks = document.querySelectorAll('.gallery-item a[data-large]');
      var modal = document.getElementById('modal');
      var modalImage = document.getElementById('modalImage');
      var modalClose = document.getElementById('modalClose');

      galleryLinks.forEach(function (link) {
        link.addEventListener('click', function (e) {
          var largeSrc = link.getAttribute('data-large');
          if (largeSrc) {
            e.preventDefault();
            modalImage.src = largeSrc;
            modal.classList.add('active');
            modal.setAttribute('aria-hidden', 'false');
          }
        });
      });

      function closeModal() {
        modal.classList.remove('active');
        modal.setAttribute('aria-hidden', 'true');
      }

      modalClose.addEventListener('click', closeModal);
      modal.addEventListener('click', function (e) {
        if (e.target === modal) closeModal();
      });
      document.addEventListener('keydown', function (e) {
        if (e.key === 'Escape') closeModal();
      });
    })();
  </script>
