<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>北欧风图像画廊</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('bg_gallery.jpg');
            background-size: cover;
            background-position: center;
            background-color: #1a1a1a;
            font-family: 'Inter', sans-serif;
            color: #dcd3b6;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 50px;
        }

        .main-container {
            background: rgba(20, 15, 10, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            padding: 60px 40px;
            border-radius: 20px;
            border: 1px solid rgba(212, 163, 115, 0.2);
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 900px;
        }

        .gallery-title {
            text-align: center;
            color: #d4a373;
            font-weight: 600;
            font-size: 32px;
            letter-spacing: 2px;
            margin-top: 0;
            margin-bottom: 40px;
            background: linear-gradient(90deg, transparent, rgba(212, 163, 115, 0.4), transparent);
            -webkit-background-clip: padding-box;
            background-clip: padding-box;
            border-bottom: 1px solid;
            border-image: linear-gradient(90deg, transparent, rgba(212, 163, 115, 0.4), transparent) 1;
            padding-bottom: 15px;
        }

        ul {
            list-style-type: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 20px;
            justify-content: center;
        }

        li {
            background: rgba(20, 15, 10, 0.8);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid rgba(212, 163, 115, 0.1);
            position: relative;
        }

        li:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 15px 30px rgba(0,0,0,0.5);
            border-color: rgba(212, 163, 115, 0.3);
        }

        a {
            text-decoration: none;
            display: flex;
            flex-direction: column;
            color: inherit;
        }

        img {
            width: 100%;
            height: auto;
            aspect-ratio: 1/1;
            object-fit: cover;
            border: none;
        }

        .item-text {
            text-align: center;
            padding: 15px;
            font-size: 14px;
            font-weight: 600;
            color: #dcd3b6;
            margin: 0;
            letter-spacing: 1px;
            border-top: 1px solid rgba(212, 163, 115, 0.1);
        }
    </style>
</head>
<body>
    <div class="main-container">
        <h1 class="gallery-title">北欧风图像画廊</h1>
        <ul>
            <li>
                <a href="t1.jpg" target="_blank">
                    <img src="t1.jpg" alt="风景1">
                    <p class="item-text">T1</p>
                </a>
            </li>
            <li>
                <a href="t2.jpg" target="_blank">
                    <img src="t2.jpg" alt="风景2">
                    <p class="item-text">T2</p>
                </a>
            </li>
            <li>
                <a href="t3.jpg" target="_blank">
                    <img src="t3.jpg" alt="风景3">
                    <p class="item-text">T3</p>
                </a>
            </li>
            <li>
                <a href="t4.jpg" target="_blank">
                    <img src="t4.jpg" alt="风景4">
                    <p class="item-text">T4</p>
                </a>
            </li>
            <li>
                <a href="t5.jpg" target="_blank">
                    <img src="t5.jpg" alt="风景5">
                    <p class="item-text">T5</p>
                </a>
            </li>
        </ul>
    </div>
</body>
</html>
